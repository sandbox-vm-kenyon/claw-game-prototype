<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claw Machine Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a0a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }
    h1 {
      color: #ffe066;
      font-size: 2rem;
      text-shadow: 0 0 18px #ff6ec7, 0 0 40px #a259ff;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    #score-bar {
      color: #fff;
      font-size: 1.1rem;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    #score-bar span { color: #ffe066; font-weight: bold; }
    canvas {
      display: block;
      border-radius: 18px;
      box-shadow: 0 0 40px #a259ff88, 0 0 80px #ff6ec744;
      background: #0d0820;
    }
    #controls {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn {
      background: linear-gradient(135deg, #a259ff, #ff6ec7);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 15px #a259ff66;
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn:active { transform: scale(0.94); box-shadow: 0 2px 8px #a259ff44; }
    #instructions {
      color: #b0a0d0;
      font-size: 0.82rem;
      margin-top: 8px;
      text-align: center;
      letter-spacing: 0.5px;
    }
    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      font-size: 2rem;
      font-weight: bold;
      color: #ffe066;
      text-shadow: 0 0 20px #ff6ec7, 0 2px 0 #a259ff;
      opacity: 0;
      transition: opacity 0.4s;
      white-space: nowrap;
      z-index: 10;
    }
    #wrapper { position: relative; }
  </style>
</head>
<body>
  <h1>&#127381; CLAW MACHINE &#127381;</h1>
  <div id="score-bar">Prizes Won: <span id="won">0</span> &nbsp;|&nbsp; Attempts: <span id="attempts">0</span></div>
  <div id="wrapper">
    <canvas id="gameCanvas" width="480" height="520"></canvas>
    <div id="message"></div>
  </div>
  <div id="controls">
    <button class="btn" id="btnLeft">&#8592; Left</button>
    <button class="btn" id="btnDrop">&#11015; Drop</button>
    <button class="btn" id="btnRight">Right &#8594;</button>
  </div>
  <div id="instructions">Arrow keys / A D = Move &nbsp;|&nbsp; Space / Down = Drop</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const MACHINE = { x: 20, y: 20, w: W - 40, h: H - 40 };
const GLASS   = { x: MACHINE.x + 12, y: MACHINE.y + 60, w: MACHINE.w - 24, h: MACHINE.h - 130 };
const CHUTE   = { x: MACHINE.x + MACHINE.w - 80, y: MACHINE.y + MACHINE.h - 64, w: 68, h: 50 };
const TRACK_Y = GLASS.y + 10;
const CLAW_SPEED = 3;
const DROP_SPEED  = 3.5;
const RETRACT_SPEED = 3;
const GRAB_RANGE  = 30;

const PRIZE_DEFS = [
  { name: 'Bear',  color: '#f4a261', accent: '#e76f51', shape: 'bear'  },
  { name: 'Bunny', color: '#e9c46a', accent: '#f4a261', shape: 'bunny' },
  { name: 'Star',  color: '#ffe066', accent: '#ff6ec7', shape: 'star'  },
  { name: 'Heart', color: '#ff6ec7', accent: '#a259ff', shape: 'heart' },
  { name: 'Duck',  color: '#90e0ef', accent: '#f4a261', shape: 'duck'  },
  { name: 'Alien', color: '#80ffb4', accent: '#a259ff', shape: 'alien' },
  { name: 'Dino',  color: '#52b788', accent: '#ffe066', shape: 'dino'  },
];

let prizes = [];
let claw = { x: GLASS.x + GLASS.w / 2, ropeLen: 30, state: 'idle', grabbed: null };
let score = { won: 0, attempts: 0 };
let keys = {};
let msgTimer = 0;
let particles = [];

function spawnPrizes() {
  prizes = [];
  const rows = 2, cols = 5;
  const padX = 36, padY = 28;
  const gw = GLASS.w - padX * 2;
  const gh = GLASS.h - padY * 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const def = PRIZE_DEFS[(r * cols + c) % PRIZE_DEFS.length];
      prizes.push({
        ...def,
        x: GLASS.x + padX + c * (gw / (cols - 1)) + (Math.random() - 0.5) * 10,
        y: GLASS.y + padY + r * (gh / (rows - 1)) + gh * 0.25 + (Math.random() - 0.5) * 10,
        r: 18,
        alive: true,
        wobble: 0,
      });
    }
  }
}

function drawStar(cx, cy, r, pts, fill, stroke) {
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const angle = (i * Math.PI) / pts - Math.PI / 2;
    const rad = i % 2 === 0 ? r : r * 0.45;
    i === 0 ? ctx.moveTo(cx + Math.cos(angle)*rad, cy + Math.sin(angle)*rad)
            : ctx.lineTo(cx + Math.cos(angle)*rad, cy + Math.sin(angle)*rad);
  }
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke();
}

function drawHeart(cx, cy, r, fill, stroke) {
  ctx.save();
  ctx.translate(cx, cy - r*0.1);
  ctx.beginPath();
  ctx.moveTo(0, r*0.4);
  ctx.bezierCurveTo(-r*1.1, -r*0.3, -r*1.1, -r*1.1, 0, -r*0.55);
  ctx.bezierCurveTo( r*1.1, -r*1.1,  r*1.1, -r*0.3, 0, r*0.4);
  ctx.closePath();
  ctx.fillStyle = fill; ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();
}

function drawBear(cx, cy, r, fill, accent) {
  ctx.beginPath(); ctx.arc(cx, cy+r*0.15, r*0.75, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy-r*0.55, r*0.52, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  for (const s of [-1,1]) {
    ctx.beginPath(); ctx.arc(cx+s*r*0.36, cy-r*0.95, r*0.18, 0, Math.PI*2);
    ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+s*r*0.36, cy-r*0.95, r*0.10, 0, Math.PI*2);
    ctx.fillStyle = accent; ctx.fill();
  }
  for (const s of [-1,1]) {
    ctx.beginPath(); ctx.arc(cx+s*r*0.17, cy-r*0.62, r*0.08, 0, Math.PI*2);
    ctx.fillStyle = '#333'; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx, cy-r*0.44, r*0.09, 0, Math.PI*2);
  ctx.fillStyle = accent; ctx.fill();
}

function drawBunny(cx, cy, r, fill, accent) {
  ctx.beginPath(); ctx.arc(cx, cy+r*0.15, r*0.72, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx, cy-r*0.5, r*0.5, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  for (const s of [-1,1]) {
    ctx.beginPath();
    ctx.ellipse(cx+s*r*0.22, cy-r*1.15, r*0.13, r*0.35, s*0.25, 0, Math.PI*2);
    ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(cx+s*r*0.22, cy-r*1.15, r*0.07, r*0.22, s*0.25, 0, Math.PI*2);
    ctx.fillStyle = '#ffb3c6'; ctx.fill();
  }
  for (const s of [-1,1]) {
    ctx.beginPath(); ctx.arc(cx+s*r*0.15, cy-r*0.57, r*0.08, 0, Math.PI*2);
    ctx.fillStyle = '#333'; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx, cy-r*0.41, r*0.07, 0, Math.PI*2);
  ctx.fillStyle = '#ff9ec6'; ctx.fill();
}

function drawDuck(cx, cy, r, fill, accent) {
  ctx.beginPath(); ctx.ellipse(cx, cy+r*0.1, r*0.8, r*0.65, 0, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.arc(cx+r*0.3, cy-r*0.55, r*0.38, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx+r*0.62, cy-r*0.6);
  ctx.lineTo(cx+r*0.95, cy-r*0.48);
  ctx.lineTo(cx+r*0.62, cy-r*0.38);
  ctx.closePath();
  ctx.fillStyle = accent; ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r*0.42, cy-r*0.63, r*0.08, 0, Math.PI*2);
  ctx.fillStyle = '#333'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r*0.44, cy-r*0.65, r*0.03, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
}

function drawAlien(cx, cy, r, fill, accent) {
  ctx.beginPath(); ctx.ellipse(cx, cy-r*0.2, r*0.65, r*0.85, 0, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  for (const s of [-1,1]) {
    ctx.beginPath(); ctx.ellipse(cx+s*r*0.25, cy-r*0.35, r*0.20, r*0.13, s*0.4, 0, Math.PI*2);
    ctx.fillStyle = '#111'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*r*0.25+s*r*0.06, cy-r*0.38, r*0.05, 0, Math.PI*2);
    ctx.fillStyle = '#66f'; ctx.fill();
  }
  for (const s of [-1,1]) {
    ctx.beginPath();
    ctx.moveTo(cx+s*r*0.22, cy-r*0.95);
    ctx.lineTo(cx+s*r*0.42, cy-r*1.35);
    ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+s*r*0.42, cy-r*1.38, r*0.07, 0, Math.PI*2);
    ctx.fillStyle = accent; ctx.fill();
  }
  ctx.beginPath();
  ctx.arc(cx, cy+r*0.1, r*0.28, 0.1, Math.PI-0.1);
  ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
}

function drawDino(cx, cy, r, fill, accent) {
  ctx.beginPath(); ctx.ellipse(cx, cy+r*0.15, r*0.7, r*0.6, 0, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx+r*0.55, cy-r*0.45, r*0.4, r*0.32, -0.4, 0, Math.PI*2);
  ctx.fillStyle = fill; ctx.fill(); ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
  for (let i = 0; i < 4; i++) {
    const sx = cx - r*0.3 + i * r*0.22;
    const sy = cy - r*0.52;
    ctx.beginPath();
    ctx.moveTo(sx-r*0.08, sy); ctx.lineTo(sx, sy-r*(0.22+i*0.04)); ctx.lineTo(sx+r*0.08, sy);
    ctx.fillStyle = accent; ctx.fill();
  }
  ctx.beginPath(); ctx.arc(cx+r*0.75, cy-r*0.55, r*0.07, 0, Math.PI*2);
  ctx.fillStyle = '#333'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx+r*0.77, cy-r*0.57, r*0.03, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx-r*0.65, cy+r*0.1);
  ctx.quadraticCurveTo(cx-r*1.1, cy+r*0.4, cx-r*1.2, cy+r*0.05);
  ctx.strokeStyle = fill; ctx.lineWidth = 8; ctx.stroke();
  ctx.strokeStyle = accent; ctx.lineWidth = 2; ctx.stroke();
}

function drawPrize(p) {
  if (!p.alive) return;
  ctx.save();
  if (p.wobble > 0) {
    ctx.translate(p.x, p.y);
    ctx.rotate(Math.sin(Date.now()/80) * 0.18 * p.wobble);
    ctx.translate(-p.x, -p.y);
    p.wobble = Math.max(0, p.wobble - 0.03);
  }
  switch (p.shape) {
    case 'bear':  drawBear(p.x, p.y, p.r, p.color, p.accent); break;
    case 'bunny': drawBunny(p.x, p.y, p.r, p.color, p.accent); break;
    case 'star':  drawStar(p.x, p.y, p.r, 5, p.color, p.accent); break;
    case 'heart': drawHeart(p.x, p.y, p.r, p.color, p.accent); break;
    case 'duck':  drawDuck(p.x, p.y, p.r, p.color, p.accent); break;
    case 'alien': drawAlien(p.x, p.y, p.r, p.color, p.accent); break;
    case 'dino':  drawDino(p.x, p.y, p.r, p.color, p.accent); break;
  }
  ctx.restore();
}

function drawMachine() {
  const grad = ctx.createLinearGradient(MACHINE.x, MACHINE.y, MACHINE.x+MACHINE.w, MACHINE.y+MACHINE.h);
  grad.addColorStop(0, '#1e3a5f');
  grad.addColorStop(0.5, '#2d6a9f');
  grad.addColorStop(1, '#1e3a5f');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(MACHINE.x, MACHINE.y, MACHINE.w, MACHINE.h, 18);
  ctx.fill();
  ctx.strokeStyle = '#5bc0eb';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.fillStyle = '#ff6ec7';
  ctx.beginPath();
  ctx.roundRect(MACHINE.x+6, MACHINE.y+6, MACHINE.w-12, 18, [12,12,0,0]);
  ctx.fill();

  ctx.font = 'bold 13px Segoe UI';
  ctx.fillStyle = '#ffe066';
  ctx.textAlign = 'center';
  ctx.shadowColor = '#ffe066';
  ctx.shadowBlur = 12;
  ctx.fillText('* PRIZE CLAW *', MACHINE.x+MACHINE.w/2, MACHINE.y+52);
  ctx.shadowBlur = 0;

  const glassGrad = ctx.createLinearGradient(GLASS.x, GLASS.y, GLASS.x, GLASS.y+GLASS.h);
  glassGrad.addColorStop(0, 'rgba(144,224,239,0.13)');
  glassGrad.addColorStop(1, 'rgba(10,10,40,0.85)');
  ctx.fillStyle = glassGrad;
  ctx.beginPath();
  ctx.roundRect(GLASS.x, GLASS.y, GLASS.w, GLASS.h, 8);
  ctx.fill();
  ctx.strokeStyle = 'rgba(91,192,235,0.6)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  ctx.roundRect(GLASS.x, GLASS.y, GLASS.w, GLASS.h, 8);
  ctx.clip();
  const glareGrad = ctx.createLinearGradient(GLASS.x, GLASS.y, GLASS.x+GLASS.w*0.5, GLASS.y+GLASS.h*0.4);
  glareGrad.addColorStop(0, 'rgba(255,255,255,0.13)');
  glareGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glareGrad;
  ctx.fillRect(GLASS.x, GLASS.y, GLASS.w, GLASS.h);
  ctx.restore();

  ctx.fillStyle = '#3a7fc1';
  ctx.beginPath();
  ctx.roundRect(GLASS.x+4, TRACK_Y-7, GLASS.w-8, 14, 7);
  ctx.fill();
  ctx.strokeStyle = '#5bc0eb';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.fillStyle = '#102a43';
  ctx.beginPath();
  ctx.roundRect(CHUTE.x, CHUTE.y, CHUTE.w, CHUTE.h, [0,0,10,10]);
  ctx.fill();
  ctx.strokeStyle = '#ff6ec7';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.font = '10px Segoe UI';
  ctx.fillStyle = '#ff6ec7';
  ctx.textAlign = 'center';
  ctx.fillText('CHUTE', CHUTE.x+CHUTE.w/2, CHUTE.y+16);

  ctx.fillStyle = '#102a43';
  ctx.beginPath();
  ctx.roundRect(MACHINE.x+6, GLASS.y+GLASS.h+4, MACHINE.w-12, MACHINE.h-(GLASS.y-MACHINE.y)-GLASS.h-10, 10);
  ctx.fill();

  const lightColors = ['#ff6ec7','#ffe066','#80ffb4','#5bc0eb','#a259ff'];
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(MACHINE.x+30+i*38, GLASS.y+GLASS.h+22, 7, 0, Math.PI*2);
    ctx.fillStyle = lightColors[i];
    ctx.shadowColor = lightColors[i];
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawClaw() {
  const cx = claw.x;
  const topY = TRACK_Y;
  const tipY = topY + claw.ropeLen;
  const openAngle = (claw.state === 'grabbing') ? 0.25 : 0.6;

  ctx.beginPath();
  ctx.moveTo(cx, topY);
  ctx.lineTo(cx, tipY-18);
  ctx.strokeStyle = '#c0c0c0';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, tipY-18, 8, 0, Math.PI*2);
  ctx.fillStyle = '#b0b8c8';
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  for (let i = 0; i < 3; i++) {
    const baseAngle = (Math.PI/2) + (i-1) * openAngle * 1.3;
    const startX = cx + Math.cos(baseAngle)*7;
    const startY = tipY - 14 + Math.sin(baseAngle)*7;
    const armAngle = (Math.PI*0.5) + (i-1)*openAngle;
    const endX = cx + Math.cos(armAngle)*20;
    const endY = tipY + Math.sin(armAngle)*20;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.quadraticCurveTo(
      cx + Math.cos(armAngle)*10, tipY + Math.sin(armAngle)*8,
      endX, endY
    );
    ctx.strokeStyle = '#e0e8f0';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.strokeStyle = '#8ab0cc';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  if (claw.grabbed && (claw.state === 'retracting' || claw.state === 'delivering')) {
    const p = claw.grabbed;
    const savedX = p.x, savedY = p.y, savedAlive = p.alive;
    p.x = cx; p.y = tipY + 24; p.alive = true;
    drawPrize(p);
    p.x = savedX; p.y = savedY; p.alive = savedAlive;
  }
}

function spawnConfetti(x, y) {
  const colors = ['#ffe066','#ff6ec7','#80ffb4','#5bc0eb','#a259ff','#f4a261'];
  for (let i = 0; i < 30; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*8,
      vy: -(Math.random()*6+2),
      r: Math.random()*5+3,
      color: colors[Math.floor(Math.random()*colors.length)],
      life: 1.0,
      rot: Math.random()*Math.PI*2,
      rv: (Math.random()-0.5)*0.3,
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.25; p.rot += p.rv; p.life -= 0.018;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r);
    ctx.restore();
  }
}

const msgEl = document.getElementById('message');
function showMessage(text, duration = 1800) {
  msgEl.textContent = text;
  msgEl.style.opacity = '1';
  clearTimeout(msgTimer);
  msgTimer = setTimeout(() => { msgEl.style.opacity = '0'; }, duration);
}

function updateScore() {
  document.getElementById('won').textContent = score.won;
  document.getElementById('attempts').textContent = score.attempts;
}

const MAX_DROP = GLASS.y + GLASS.h - 30;

function startDrop() {
  if (claw.state !== 'idle') return;
  claw.state = 'dropping';
  claw.grabbed = null;
  score.attempts++;
  updateScore();
}

function tryGrab() {
  let best = null, bestDist = GRAB_RANGE;
  for (const p of prizes) {
    if (!p.alive) continue;
    const dx = p.x - claw.x;
    const dy = p.y - (TRACK_Y + claw.ropeLen + 22);
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < bestDist) { bestDist = d; best = p; }
  }
  return best;
}

function update() {
  if (claw.state === 'idle') {
    if (keys['ArrowLeft'] || keys['a'] || keys['A'])
      claw.x = Math.max(GLASS.x+20, claw.x - CLAW_SPEED);
    if (keys['ArrowRight'] || keys['d'] || keys['D'])
      claw.x = Math.min(GLASS.x+GLASS.w-20, claw.x + CLAW_SPEED);
    if (keys['ArrowDown'] || keys[' '] || keys['Enter'])
      startDrop();
  }

  if (claw.state === 'dropping') {
    claw.ropeLen += DROP_SPEED;
    const tipY = TRACK_Y + claw.ropeLen + 22;
    if (tipY >= MAX_DROP) {
      claw.state = 'grabbing';
      setTimeout(() => {
        const grabbed = tryGrab();
        if (grabbed) {
          grabbed.alive = false;
          claw.grabbed = grabbed;
        }
        claw.state = 'retracting';
      }, 350);
    }
  }

  if (claw.state === 'retracting') {
    if (claw.ropeLen > 30) {
      claw.ropeLen -= RETRACT_SPEED;
    } else {
      claw.ropeLen = 30;
      if (claw.grabbed) {
        claw.state = 'delivering';
      } else {
        claw.state = 'idle';
        showMessage('So close! Try again!');
      }
    }
  }

  if (claw.state === 'delivering') {
    const targetX = CHUTE.x + CHUTE.w/2;
    if (Math.abs(claw.x - targetX) > 3) {
      claw.x += (targetX - claw.x) * 0.08;
    } else {
      claw.x = targetX;
      score.won++;
      updateScore();
      spawnConfetti(claw.x, CHUTE.y);
      const name = claw.grabbed.name;
      claw.grabbed = null;
      claw.state = 'idle';
      showMessage('You got a ' + name + '!');
      if (prizes.every(p => !p.alive)) {
        setTimeout(() => {
          spawnPrizes();
          showMessage('New prizes loaded!');
        }, 1500);
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawMachine();
  prizes.forEach(drawPrize);
  drawClaw();
  updateParticles();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });

function holdKey(key, el) {
  const start = () => { keys[key] = true; };
  const stop  = () => { keys[key] = false; };
  el.addEventListener('pointerdown',  e => { e.preventDefault(); start(); });
  el.addEventListener('pointerup',    stop);
  el.addEventListener('pointerleave', stop);
  el.addEventListener('pointercancel', stop);
}
holdKey('ArrowLeft',  document.getElementById('btnLeft'));
holdKey('ArrowRight', document.getElementById('btnRight'));
holdKey(' ',          document.getElementById('btnDrop'));

spawnPrizes();
loop();
</script>
</body>
</html>
