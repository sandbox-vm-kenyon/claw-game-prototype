<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claw Machine Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a0a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }
    h1 {
      color: #ffe066;
      font-size: 2rem;
      text-shadow: 0 0 18px #ff6ec7, 0 0 40px #a259ff;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    canvas {
      display: block;
      border-radius: 18px;
      box-shadow: 0 0 40px #a259ff88, 0 0 80px #ff6ec744;
      background: #0d0820;
    }
    #controls {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn {
      background: linear-gradient(135deg, #a259ff, #ff6ec7);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 15px #a259ff66;
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn:active { transform: scale(0.94); box-shadow: 0 2px 8px #a259ff44; }
    #instructions {
      color: #b0a0d0;
      font-size: 0.82rem;
      margin-top: 8px;
      text-align: center;
      letter-spacing: 0.5px;
    }
    #wrapper { position: relative; }
  </style>
</head>
<body>
  <h1>&#127381; CLAW MACHINE &#127381;</h1>
  <div id="wrapper">
    <canvas id="canvas" width="480" height="520"></canvas>
  </div>
  <div id="controls">
    <button class="btn" id="btnLeft">&#8592; Left</button>
    <button class="btn" id="btnJump">&#8593; Jump</button>
    <button class="btn" id="btnRight">Right &#8594;</button>
  </div>
  <div id="instructions">Arrow keys / A D = Move &nbsp;|&nbsp; Up / W / Space = Jump &nbsp;|&nbsp; Dodge the claw!</div>

<script src="game.js"></script>
<script>
// Touch/click controls for mobile, wired into game.js's shared top-level
// `keys` state (classic <script> tags share the same global lexical scope).
function holdKey(key, el) {
  const start = () => { keys[key] = true; };
  const stop  = () => { keys[key] = false; };
  el.addEventListener('pointerdown',  e => { e.preventDefault(); start(); });
  el.addEventListener('pointerup',    stop);
  el.addEventListener('pointerleave', stop);
  el.addEventListener('pointercancel', stop);
}
holdKey('ArrowLeft',  document.getElementById('btnLeft'));
holdKey('ArrowRight', document.getElementById('btnRight'));
holdKey('ArrowUp',    document.getElementById('btnJump'));
</script>
</body>
</html>
