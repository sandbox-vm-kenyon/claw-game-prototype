<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Claw Machine Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      background: #1a0a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      /* Reserve room at the bottom of the page for the fixed controls bar
         (joystick is the tallest control at 96px + 8px inset = ~104px) plus
         the iOS Chrome bottom button bar (safe-area inset). Content is
         top-anchored (justify-content:flex-start) so the canvas is laid out
         from the top and this reserved band at the bottom is never encroached
         on — the controls therefore always sit BELOW the canvas, and are
         lifted clear of the Chrome bar by the safe-area inset. */
      padding-top: 6px;
      padding-bottom: calc(120px + env(safe-area-inset-bottom, 0px));
    }
    h1 {
      color: #ffe066;
      font-size: 2rem;
      text-shadow: 0 0 18px #ff6ec7, 0 0 40px #a259ff;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    canvas {
      display: block;
      border-radius: 18px;
      box-shadow: 0 0 40px #a259ff88, 0 0 80px #ff6ec744;
      background: #0d0820;
      /* Keep the canvas's internal resolution at 480x520 (game.js reads those
         pixel dimensions), but scale its ON-SCREEN size down to fit the space
         that remains above the h1, the instructions, and the reserved
         controls/Chrome-bar band at the bottom. This guarantees the whole
         game view sits ABOVE the controls on short (iOS Chrome) viewports
         instead of being overlapped by them. The 480/520 aspect ratio is
         preserved via aspect-ratio + width derived from the height cap. */
      aspect-ratio: 480 / 520;
      width: auto;
      height: min(520px, calc(100vh - 200px - env(safe-area-inset-bottom, 0px)));
      max-width: 100vw;
    }
    #instructions {
      color: #b0a0d0;
      font-size: 0.82rem;
      margin-top: 8px;
      text-align: center;
      letter-spacing: 0.5px;
    }
    #wrapper { position: relative; touch-action: none; overflow: visible; }

    /* One-handed controls bar. This sits in normal document flow BELOW the
       game canvas (it is NOT absolutely positioned inside #wrapper), so the
       joystick and jump button can never overlap the gameplay area. It is
       pinned to the bottom of the viewport and lifted above the iOS Chrome
       bottom button bar via the safe-area inset, so it stays fully visible. */
    #controls {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      pointer-events: none; /* only the controls themselves capture touches */
      z-index: 10;
    }
    #joystick {
      position: relative;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(162,89,255,0.55);
      touch-action: none;
      pointer-events: auto;
    }
    #joystickKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 44px;
      height: 44px;
      margin-left: -22px;
      margin-top: -22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a259ff, #ff6ec7);
      box-shadow: 0 4px 15px #a259ff66;
      pointer-events: none;
    }
    #btnJump {
      position: relative;
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a259ff, #ff6ec7);
      color: #fff;
      border: none;
      font: bold 0.95rem 'Segoe UI', Arial, sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 15px #a259ff66;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      pointer-events: auto;
    }
    #btnJump:active { transform: scale(0.94); box-shadow: 0 2px 8px #a259ff44; }

    /* Play Again button: overlaid on the canvas, hidden until the game-over
       screen has faded fully in, then faded in itself and made clickable. */
    #btnPlayAgain {
      position: absolute;
      left: 50%;
      top: 360px;
      transform: translateX(-50%) scale(0.9);
      padding: 12px 30px;
      border-radius: 30px;
      background: linear-gradient(135deg, #a259ff, #ff6ec7);
      color: #fff;
      border: none;
      font: bold 1rem 'Segoe UI', Arial, sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 4px 15px #a259ff66;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 5;
    }
    #btnPlayAgain.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) scale(1);
    }
    #btnPlayAgain:active { transform: translateX(-50%) scale(0.94); }
  </style>
</head>
<body>
  <h1>&#127381; CLAW MACHINE &#127381;</h1>
  <div id="wrapper">
    <canvas id="canvas" width="480" height="520"></canvas>
    <button id="btnPlayAgain">PLAY AGAIN</button>
  </div>
  <div id="instructions">Left joystick = Move &nbsp;|&nbsp; Right button = Jump &nbsp;|&nbsp; Arrow keys / A D / W / Space also work &nbsp;|&nbsp; Dodge the claw! &nbsp;|&nbsp; Game over? Press R or tap Play Again</div>
  <div id="controls">
    <div id="joystick"><div id="joystickKnob"></div></div>
    <button id="btnJump">JUMP</button>
  </div>

<script src="game.js"></script>
<script>
// One-handed controls: a left-side virtual joystick drives movement and a
// right-side button triggers the jump (the game's only other action — the
// claw itself is fully AI-controlled, so there's no separate "drop" input
// to bind). Both are wired into game.js's shared top-level `keys` state
// (classic <script> tags share the same global lexical scope), the same
// way the previous touch buttons were.
function holdKey(key, el) {
  const start = () => { keys[key] = true; };
  const stop  = () => { keys[key] = false; };
  el.addEventListener('pointerdown',  e => { e.preventDefault(); start(); });
  el.addEventListener('pointerup',    stop);
  el.addEventListener('pointerleave', stop);
  el.addEventListener('pointercancel', stop);
}
holdKey('ArrowUp', document.getElementById('btnJump'));

// Draggable joystick: only horizontal deflection affects movement, since
// this is a side-scrolling platformer with no vertical steering.
const joystick = document.getElementById('joystick');
const joystickKnob = document.getElementById('joystickKnob');
const JOYSTICK_RADIUS = 26; // max knob travel from center, in px
const JOYSTICK_DEADZONE = 10;
let joystickPointerId = null;

function updateJoystick(clientX, clientY) {
  const rect = joystick.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = clientX - cx;
  const dy = clientY - cy;
  const dist = Math.min(Math.hypot(dx, dy), JOYSTICK_RADIUS);
  const angle = Math.atan2(dy, dx);
  joystickKnob.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;

  keys['ArrowRight'] = dx > JOYSTICK_DEADZONE;
  keys['ArrowLeft']  = dx < -JOYSTICK_DEADZONE;
}

function resetJoystick() {
  joystickKnob.style.transform = 'translate(0, 0)';
  keys['ArrowLeft'] = false;
  keys['ArrowRight'] = false;
  joystickPointerId = null;
}

joystick.addEventListener('pointerdown', e => {
  e.preventDefault();
  joystickPointerId = e.pointerId;
  joystick.setPointerCapture(e.pointerId);
  updateJoystick(e.clientX, e.clientY);
});
joystick.addEventListener('pointermove', e => {
  if (e.pointerId !== joystickPointerId) return;
  updateJoystick(e.clientX, e.clientY);
});
joystick.addEventListener('pointerup',     e => { if (e.pointerId === joystickPointerId) resetJoystick(); });
joystick.addEventListener('pointercancel', e => { if (e.pointerId === joystickPointerId) resetJoystick(); });
</script>
</body>
</html>
