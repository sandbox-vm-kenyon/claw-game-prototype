<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
  canvas { border: 2px solid #333; display: block; }
  #instructions { color: #555; font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<canvas id="canvas" width="480" height="480"></canvas>
<div id="instructions">Arrow keys / WASD to move &nbsp;|&nbsp; R to restart</div>
<script src="game.js"></script>
</body>
</html>
